version: "3.8"
services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app/data:/app/data
      - model-cache:/root/.cache/fairseq2
    environment:
      - LLAMA_API_KEY=${LLAMA_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - ASR_DEVICE=${ASR_DEVICE:-cpu}
      - SQLITE_PATH=${SQLITE_PATH:-./data/voxatlas.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  model-cache:
